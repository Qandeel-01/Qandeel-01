<svg viewBox="0 0 1000 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Experience — open source contributions to opengeos/leafmap, opengeos/segment-geospatial, earthaccess-dev/earthaccess">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --dim: #AAAAAA; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --dim: #666666; --accent: #AAAAAA; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:translateY(0); } }
    .a1{animation-delay:.15s} .a2{animation-delay:.35s} .a3{animation-delay:.55s}
    @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
    :root { --bone: #000000; --muted: #000000; --dim: #000000; --rule: #000000; --accent: #000000; }
  </style>

  <line x1="120" y1="10" x2="120" y2="290" stroke="var(--rule)" stroke-width="1" opacity=".4"/>

  <g class="rise a1">
    <text class="mono" x="48" y="42"  font-size="12" fill="var(--accent)" letter-spacing="2">2025</text>
    <text class="mono" x="136" y="42"  font-size="15" fill="var(--bone)">opengeos/leafmap · Open Source Contributor</text>
    <text class="mono" x="136" y="68"  font-size="14" fill="var(--muted)">PR #1343 — extended geospatial visualization capabilities in the leafmap library</text>
    <text class="mono" x="136" y="90"  font-size="14" fill="var(--muted)">Python · geospatial · open source · ipyleaflet</text>
  </g>

  <g class="rise a2">
    <text class="mono" x="48" y="138" font-size="12" fill="var(--accent)" letter-spacing="2">2025</text>
    <text class="mono" x="136" y="138" font-size="15" fill="var(--bone)">opengeos/segment-geospatial · Open Source Contributor</text>
    <text class="mono" x="136" y="164" font-size="14" fill="var(--muted)">PR #546 — contributed to the Segment Anything Model geospatial integration</text>
    <text class="mono" x="136" y="186" font-size="14" fill="var(--muted)">Python · SAM · geospatial segmentation · remote sensing</text>
  </g>

  <g class="rise a3">
    <text class="mono" x="48" y="234" font-size="12" fill="var(--accent)" letter-spacing="2">2025</text>
    <text class="mono" x="136" y="234" font-size="15" fill="var(--bone)">earthaccess-dev/earthaccess · Open Source Contributor</text>
    <text class="mono" x="136" y="260" font-size="14" fill="var(--muted)">PR #1398 — improved NASA Earth data access and search tooling</text>
    <text class="mono" x="136" y="282" font-size="14" fill="var(--muted)">Python · NASA Earthdata · remote sensing · data access</text>
  </g>
</svg>
