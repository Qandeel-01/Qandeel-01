  <text fill="var(--dim)" class="mono" x="48" y="78" font-size="10" letter-spacing="2.5">LANGUAGE DISTRIBUTION Â· EST.</text>
  <g class="mono" font-size="11">
    <text fill="var(--bone)" x="48" y="108">python</text>       <rect class="bar g1" x="48" y="116" width="235" height="6" fill="var(--accent)"/><text fill="var(--muted)" x="293" y="123" font-size="10">38%</text>
    <text fill="var(--bone)" x="48" y="146">javascript</text>  <rect class="bar g2" x="48" y="154" width="185" height="6" fill="var(--bone)"/><text fill="var(--muted)" x="243" y="161" font-size="10">30%</text>
    <text fill="var(--bone)" x="48" y="184">html</text>         <rect class="bar g3" x="48" y="192" width="100" height="6" fill="var(--bone)"/><text fill="var(--muted)" x="158" y="199" font-size="10">16%</text>
    <text fill="var(--bone)" x="48" y="222">css</text>          <rect class="bar g4" x="48" y="230" width="65"  height="6" fill="var(--bone)"/><text fill="var(--muted)" x="123" y="237" font-size="10">10%</text>
    <text fill="var(--bone)" x="48" y="260">typescript</text>  <rect class="bar g5" x="48" y="268" width="40"  height="6" fill="var(--bone)"/><text fill="var(--muted)" x="98"  y="275" font-size="10">6%</text>
  </g>

  <text fill="var(--dim)" class="mono" x="392" y="78" font-size="10" letter-spacing="2.5">SHIPPING VELOCITY Â· 2024 â†’ 2026</text>
  <g>
    <line x1="392" y1="252" x2="656" y2="252" stroke="var(--rule)"/>
    <polyline class="spark" points="392,248 440,238 488,220 536,195 584,155 622,115 656,90" stroke="var(--accent)" stroke-width="1.5" fill="none"/>
    <circle class="dot d1" cx="440" cy="238" r="2.5" fill="var(--bone)"/>
    <circle class="dot d2" cx="488" cy="220" r="2.5" fill="var(--bone)"/>
    <circle class="dot d3" cx="536" cy="195" r="2.5" fill="var(--bone)"/>
    <circle class="dot d4" cx="584" cy="155" r="2.5" fill="var(--bone)"/>
    <circle class="ping" cx="622" cy="115" r="4" stroke="var(--accent)" fill="none"/>
    <circle class="dot d5" cx="622" cy="115" r="3" fill="var(--accent)"/>
    <text fill="var(--dim)" class="mono" x="392" y="272" font-size="9.5" letter-spacing="1.5">'24</text>
    <text fill="var(--dim)" class="mono" x="524" y="272" font-size="9.5" letter-spacing="1.5">'25</text>
    <text fill="var(--dim)" class="mono" x="640" y="272" font-size="9.5" letter-spacing="1.5">'26</text>
    <text fill="var(--muted)" class="mono dot d6" x="392" y="300" font-size="10" letter-spacing="1.5">trend â€” <tspan fill="var(--accent)">accelerating</tspan></text>
  </g>

  <g>
    <g class="rise n1"><text fill="var(--bone)" class="mono" x="720" y="118" font-size="44">14</text><text fill="var(--muted)" class="mono" x="790" y="112" font-size="10" letter-spacing="2.5">REPOSITORIES</text></g>
    <g class="rise n2"><text fill="var(--bone)" class="mono" x="720" y="178" font-size="44">6</text><text fill="var(--muted)" class="mono" x="790" y="172" font-size="10" letter-spacing="2.5">PROJECTS DOCUMENTED</text></g>
    <g class="rise n3"><text fill="var(--bone)" class="mono" x="720" y="238" font-size="44">3</text><text fill="var(--muted)" class="mono" x="790" y="232" font-size="10" letter-spacing="2.5">OPEN SOURCE PRs MERGED</text></g>
    <g class="rise n4"><text fill="var(--accent)" class="mono" x="718" y="298" font-size="44">âˆž</text><text fill="var(--muted)" class="mono" x="790" y="292" font-size="10" letter-spacing="2.5">GEOTIFF FILES PROCESSED</text></g>
